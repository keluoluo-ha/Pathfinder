  expire-hours: 24

pathfinder:
  forum:
    upload-dir: ./uploads/forum
    max-file-size-mb: 50
  recommendation:
    chong-limit: 15
    wen-limit: 15
    bao-limit: 10
    redis-ttl-minutes: 120
    db-cache-hours: 12

# 👇 文档配置
